<!-- Make an HTML form to collect the information for admitting patients in a hospital.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HOSPITAL MANAGEMENT SYSTEM</title>
</head>
<body>
    <form action="/collect patient info" align="center">
        <h1>HOSPITAL MANAGEMENT SYSTEM</h1>
        
        <label>Name</label>
        <input type="text" placeholder="Name"> <br><br>
        
        <label>Age</label>
        <input type="number" placeholder="Age"><br><br>
        
        <label>Gender</label>
        <input type="radio" name="gender" value="Male"/> Male
        <input type="radio" name="gender" value="Female" /> Female<br><br>
        
        <label>Address</label>
        <input type="text" placeholder="Address"><br><br>

        <label>Phone</label>
        <input type="number" placeholder="Phone Number"><br><br>

        <label>Email</label>
        <input type="email" placeholder="your@email.com"> <br><br>

        <label>Doctor</label>
        <select>
            <option>Doctor Ali</option>
            <option>Doctor Alina</option>
            <option>Doctor Sara</option>
        </select>
        <br><br>

        <label>Date</label>
        <input type="date"><br><br>

        <label>Time</label>
        <input type="time"><br><br>
        
        <label>Symptoms</label>
        <textarea placeholder="Describe your symptoms"></textarea><br><br>

        <input type="Submit">
        <input type="Reset">
    </form>
</body>
</html>
